<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дуэль слов</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg-0:#19162b; --bg-1:#241f3d; --bg-2:#2c2247;
    --ink:#f2eefb; --ink-dim:#9a93b8;
    --slate:#46537a; --slate-hi:#56649a;
    --you:#3d6fd1; --you-hi:#5b8def; --you-lock:#9fc0ff;
    --bot:#c95a92; --bot-hi:#c95a92; --bot-lock:#e89dc0;
    --accent:#ff4f8b;
    --good:#4ad6a0; --bad:#ff6b6b;
    --r:14px; --tile:68px; --gap:8px;
    --font: -apple-system, "Segoe UI", Roboto, system-ui, "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    font-family:var(--font); color:var(--ink);
    background:
      radial-gradient(120% 80% at 18% 0%, rgba(61,111,209,.20), transparent 55%),
      radial-gradient(120% 80% at 82% 0%, rgba(201,90,146,.22), transparent 55%),
      linear-gradient(180deg,var(--bg-1),var(--bg-0));
    background-attachment:fixed;
    display:flex; justify-content:center; align-items:flex-start;
    padding:14px 12px 22px; min-height:100%;
  }
  .page{width:100%; max-width:960px; display:flex; flex-direction:column; align-items:center; gap:0}
  .app{width:100%; max-width:440px; display:flex; flex-direction:column; gap:12px}

  .topline{text-align:center; letter-spacing:.14em; font-size:10px; color:var(--ink-dim);
    text-transform:uppercase; font-weight:700}

  /* players */
  .players{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px}
  .pl{display:flex; flex-direction:column; align-items:center; gap:3px; min-width:0}
  .ava{width:52px; height:52px; border-radius:50%; display:grid; place-items:center;
    font-size:26px; background:#0e0c1c; border:3px solid var(--slate-hi); position:relative}
  .pl.you .ava{border-color:var(--you-hi); box-shadow:0 0 0 4px rgba(91,141,239,.14)}
  .pl.bot .ava{border-color:var(--bot-hi); box-shadow:0 0 0 4px rgba(201,90,146,.14)}
  .pname{font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase}
  .pl.you .pname{color:var(--you-hi)} .pl.bot .pname{color:var(--bot-hi)}
  .pscore{font-size:30px; font-weight:800; line-height:1}
  .pl.you .pscore{color:var(--you-hi)} .pl.bot .pscore{color:var(--bot-hi)}
  .turnpill{font-size:11px; font-weight:800; text-align:center; padding:9px 12px; border-radius:999px;
    border:1.5px solid var(--accent); color:var(--ink); background:rgba(255,79,139,.08);
    min-width:120px; line-height:1.25}
  .turnpill.you{border-color:var(--you-hi); background:rgba(91,141,239,.10)}
  .turnpill.urgent{border-color:var(--bad)!important; background:rgba(255,107,107,.12)!important; color:var(--bad)!important}
  .timerbar{height:3px; border-radius:2px; background:rgba(255,255,255,.08); overflow:hidden; margin-top:-8px}
  .timerbar__fill{height:100%; background:var(--you-hi); transition:width 1s linear; border-radius:2px}
  .timerbar.urgent .timerbar__fill{background:var(--bad)}
  .words{margin-top:2px; width:100%; display:flex; flex-direction:column; gap:3px}
  .wrow{display:flex; justify-content:space-between; font-size:11px; font-weight:700;
    background:rgba(255,255,255,.04); padding:3px 8px; border-radius:7px}
  .pl.you .wrow{color:#c9d8ff} .pl.bot .wrow{color:#ffcbe2}
  .wrow b{font-weight:800}

  /* board */
  .board{display:grid; gap:var(--gap); justify-content:center; margin:2px auto 0}
  .tile{width:var(--tile); height:var(--tile); border-radius:var(--r); border:none;
    font-family:var(--font); font-size:28px; font-weight:800; color:#fff;
    display:grid; place-items:center; cursor:pointer; position:relative;
    background:var(--slate); box-shadow:0 3px 0 rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.12);
    transition:transform .08s, background .15s; user-select:none}
  .tile:active{transform:translateY(1px)}
  .tile.you{background:var(--you)} .tile.bot{background:var(--bot)}
  .tile.you.lock{background:var(--you-lock); color:#10254e}
  .tile.bot.lock{background:var(--bot-lock); color:#5e1238}
  .tile.lock::after{content:""; position:absolute; top:5px; right:6px; width:6px; height:6px;
    border-radius:50%; background:rgba(255,255,255,.55)}
  .tile.sel{outline:3px solid var(--you-hi); outline-offset:-1px; transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(91,141,239,.40)}
  .tile .ord{position:absolute; left:-4px; top:-5px; min-width:16px; height:16px; padding:0 3px;
    border-radius:8px; background:var(--accent); color:#fff; font-size:10px; font-weight:800;
    display:grid; place-items:center}
  .tile.hint{animation:pulse .55s ease 2}
  @keyframes pulse{50%{outline:3px solid var(--good); outline-offset:-1px}}

  /* current word + controls */
  .cur{height:30px; display:flex; align-items:center; justify-content:center; gap:1px;
    font-size:20px; font-weight:800; letter-spacing:.12em}
  .cur .ph{color:var(--ink-dim); letter-spacing:.3em; font-weight:700}
  .msg{height:16px; text-align:center; font-size:12px; font-weight:700}
  .msg.bad{color:var(--bad)} .msg.good{color:var(--good)}
  .controls{display:grid; grid-template-columns:1fr 1fr 1.4fr; gap:8px}
  .btn{border:none; border-radius:999px; padding:13px 10px; font-family:var(--font);
    font-size:14px; font-weight:800; cursor:pointer; color:var(--ink);
    background:rgba(255,255,255,.07)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:rgba(255,255,255,.06); color:var(--ink-dim)}
  .btn.accept{background:var(--you); color:#fff; box-shadow:0 3px 0 #2b54a8}
  .btn:disabled{opacity:.4; cursor:default; box-shadow:none}
  .subbar{display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:2px}
  .linkbtn{background:none; border:none; color:var(--ink-dim); font-size:12px; font-weight:700;
    cursor:pointer; text-decoration:underline; font-family:var(--font)}

  /* end overlay */
  .end{position:fixed; inset:0; background:rgba(12,10,24,.82); display:none;
    place-items:center; padding:24px; z-index:9}
  .end.show{display:grid}
  .card{width:100%; max-width:340px; background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
    border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:26px 22px; text-align:center}
  .card h2{margin:0 0 6px; font-size:24px; font-weight:800}
  .card p{margin:0 0 18px; color:var(--ink-dim); font-size:14px; font-weight:700}

  /* header — always visible above both tabs */
  .game-header{width:100%;max-width:440px;display:flex;align-items:center;
    justify-content:space-between;gap:8px;padding:0 0 4px}
  .iconBtn{width:48px;height:48px;border-radius:12px;border:none;
    background:rgba(255,255,255,.07);font-size:22px;cursor:pointer;
    display:grid;place-items:center;flex-shrink:0;transition:background .15s}
  .iconBtn.active{background:rgba(91,141,239,.18)}
  .iconBtn:active{transform:scale(.92)}

  /* levels tab */
  .lvl-wrap{width:100%;max-width:440px;padding:0 12px 0;box-sizing:border-box;
    display:flex;flex-direction:column;gap:14px}
  .lvl-summary{text-align:center;font-size:12px;font-weight:800;
    color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase}
  .lvl-summary b{color:var(--you-hi);font-size:16px}
  .lvl-tier{display:flex;flex-direction:column;gap:8px}
  .lvl-tier-hdr{font-size:11px;font-weight:800;color:var(--ink-dim);
    letter-spacing:.12em;text-transform:uppercase;padding:2px 0}
  .lvl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .lvl-cell{aspect-ratio:1;border-radius:12px;border:2px solid transparent;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:1px;font-family:var(--font);transition:transform .08s}
  .lvl-cell:active{transform:scale(.94)}
  .lvl-cell .lvl-n{font-size:15px;font-weight:800;line-height:1}
  .lvl-cell .lvl-e{font-size:13px;line-height:1}
  .lvl-cell.done{background:rgba(61,111,209,.18);color:var(--you-hi)}
  .lvl-cell.current{background:var(--you);color:#fff;
    border-color:var(--you-hi);box-shadow:0 0 0 3px rgba(91,141,239,.25)}
  .lvl-cell.locked{background:rgba(255,255,255,.04);color:rgba(255,255,255,.2);
    cursor:default;border-color:transparent}
  .hidden{display:none!important}

  /* small phone fallback */
  @media(max-width:359px){
    :root{--tile:56px;--gap:6px;--r:11px}
    .tile{font-size:23px}
  }
</style>
</head>
<body>
<div class="page">
<div class="game-header">
  <button class="iconBtn active" id="tabGame" onclick="switchTab('game')">🎮</button>
  <div class="topline" id="levelLine">Уровень 1</div>
  <button class="iconBtn" id="tabLevels" onclick="switchTab('levels')">🏆</button>
</div>
<div class="app" id="gameTab">

  <div class="players">
    <div class="pl you">
      <div class="ava">🐰</div>
      <div class="pname">Игрок</div>
      <div class="pscore" id="youScore">0</div>
      <div class="words" id="youWords"></div>
    </div>
    <div class="turnpill" id="turnPill">Ваш ход</div>
    <div class="pl bot">
      <div class="ava" id="botAva">🤖</div>
      <div class="pname" id="botName">Новичок</div>
      <div class="pscore" id="botScore">0</div>
      <div class="words" id="botWords"></div>
    </div>
  </div>

  <div class="timerbar" id="timerbar"><div class="timerbar__fill" id="timerFill" style="width:100%"></div></div>
  <div class="board" id="board"></div>

  <div class="cur" id="cur"><span class="ph">— —</span></div>
  <div class="msg" id="msg"></div>

  <div class="controls">
    <button class="btn ghost" id="hintBtn">Подсказка</button>
    <button class="btn ghost" id="clearBtn">Сброс</button>
    <button class="btn accept" id="acceptBtn" disabled>Принять</button>
  </div>
  <div class="subbar">
    <button class="linkbtn" id="passBtn">Пропустить ход</button>
    <button class="linkbtn" id="resetBtn">Сбросить уровень</button>
  </div>
</div>

<div class="lvl-wrap hidden" id="levelsTab">
  <div class="lvl-summary">Пройдено уровней: <b id="lvlCount">0</b></div>
  <div id="levelsGrid"></div>
</div>
</div>

<div class="end" id="end">
  <div class="card">
    <h2 id="endTitle"></h2>
    <p id="endText"></p>
    <button class="btn accept" id="endNew" style="width:100%">Новая партия</button>
  </div>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg){ try{ tg.ready(); tg.expand(); }catch(e){} }

/* ---------- словарь ---------- */
let DICT = new Set();

/* ---------- прогрессия ---------- */
let level = parseInt(localStorage.getItem('duel_level') || '1');

function botTopN(lvl) {
  if (lvl >= 15) return 1;
  if (lvl >= 10) return 2;
  if (lvl >= 7)  return 4;
  if (lvl >= 5)  return 7;
  if (lvl >= 3)  return 12;
  return 999;
}
function botBonusTiles(lvl) {
  return lvl > 20 ? Math.min(Math.floor((lvl - 20) / 5), 6) : 0;
}
function botTitle(lvl) {
  if (lvl >= 21) return 'Легенда';
  if (lvl >= 16) return 'Гроссмейстер';
  if (lvl >= 11) return 'Мастер';
  if (lvl >= 7)  return 'Знаток';
  if (lvl >= 4)  return 'Любитель';
  return 'Новичок';
}
function botAvaChar(lvl) {
  if (lvl >= 21) return '🔥';
  if (lvl >= 16) return '👑';
  if (lvl >= 11) return '😎';
  if (lvl >= 7)  return '🧠';
  if (lvl >= 4)  return '😐';
  return '🤖';
}

/* ---------- конфиг поля ---------- */
const COLS=4, ROWS=4, N=COLS*ROWS;
const BAG = (()=>{
  const w={о:11,е:10,а:8,и:7,н:7,т:6,с:6,р:6,в:5,л:5,к:5,п:4,м:4,д:4,у:4,я:2,г:2,з:2,б:2,й:2,х:2,ж:1,ш:1,ц:1,ч:2,ь:2,ы:2,э:1,ф:1,ю:1};
  const arr=[]; for(const k in w){ for(let i=0;i<w[k];i++) arr.push(k);} return arr;
})();
const VOW = new Set(['а','е','и','о','у','ы','э','ю','я']);
const RARE = new Set(['й','ю','э','ь','ъ','ы','ф','ж']);

function dedupRare(b){
  const seen=new Set();
  for(let i=0;i<b.length;i++){
    const ch=b[i].ch;
    if(RARE.has(ch)){
      if(seen.has(ch)){
        let r; do{ r=BAG[(Math.random()*BAG.length)|0]; }while(RARE.has(r));
        b[i].ch=r;
      } else { seen.add(ch); }
    }
  }
}

/* ---------- состояние ---------- */
let board=[], sel=[], turn='you', played=new Set(), passes=0, busy=false;
let timerId=null, timeLeft=40;
let botTimerId=null, botThinkId=null, botVisualLeft=0;
const TURN_SEC=40;
const $=id=>document.getElementById(id);
const neighbors=i=>{const r=(i/COLS)|0,c=i%COLS,o=[];if(r>0)o.push(i-COLS);if(r<ROWS-1)o.push(i+COLS);if(c>0)o.push(i-1);if(c<COLS-1)o.push(i+1);return o;};

function letterMultiset(arr){const m={};for(const ch of arr)m[ch]=(m[ch]||0)+1;return m;}
function formable(word,counts){const need={};for(const ch of word){need[ch]=(need[ch]||0)+1;if((need[ch])>(counts[ch]||0))return false;}return true;}

function newBoard(){
  for(let tries=0;tries<60;tries++){
    const b=[];
    for(let i=0;i<N;i++) b.push({ch:BAG[(Math.random()*BAG.length)|0],owner:null});
    dedupRare(b);
    const vowels=b.filter(t=>VOW.has(t.ch)).length;
    if(vowels<4||vowels>8) continue;
    const counts=letterMultiset(b.map(t=>t.ch));
    let ok=0; for(const w of DICT){if(formable(w,counts)){ok++;if(ok>=10)break;}}
    if(ok>=10) return b;
  }
  return Array.from({length:N},()=>({ch:BAG[(Math.random()*BAG.length)|0],owner:null}));
}

function lockedSet(b){
  const s=new Set();
  for(let i=0;i<N;i++){const o=b[i].owner;if(!o)continue;
    if(neighbors(i).every(j=>b[j].owner===o))s.add(i);}
  return s;
}

function wordAllowed(w){
  if(played.has(w)) return false;
  for(const p of played){if(w.length>p.length&&w.startsWith(p))return false;}
  return true;
}

function applyWord(player,tiles,word){
  const locks=lockedSet(board);
  for(const i of tiles){
    if(board[i].owner===player) continue;
    if(board[i].owner&&locks.has(i)) continue;
    board[i].owner=player;
  }
  played.add(word);
}

/* ---------- бот ---------- */
function flipVal(i,player,locks){
  const o=board[i].owner;
  if(o===player) return 0;
  if(o&&locks.has(i)) return 0;
  if(o) return 3;
  return 2;
}

function allMoves(player){
  const counts=letterMultiset(board.map(t=>t.ch));
  const locks=lockedSet(board);
  const moves=[];
  for(const w of DICT){
    if(!wordAllowed(w)||!formable(w,counts)) continue;
    const used=new Set();let tiles=[],gain=0,steal=0,okWord=true;
    const need=letterMultiset(w);
    for(const ch in need){
      const cand=[];
      for(let i=0;i<N;i++){if(board[i].ch===ch&&!used.has(i))cand.push(i);}
      cand.sort((a,b)=>flipVal(b,player,locks)-flipVal(a,player,locks));
      if(cand.length<need[ch]){okWord=false;break;}
      for(let k=0;k<need[ch];k++){const i=cand[k];used.add(i);tiles.push(i);
        const o=board[i].owner;
        if(o!==player&&!(o&&locks.has(i))){gain++;if(o&&o!==player)steal++;}}
    }
    if(!okWord) continue;
    moves.push({word:w,tiles,score:gain*10+steal*4+w.length,gain});
  }
  moves.sort((a,b)=>b.score-a.score);
  return moves;
}

function bestMove(player){
  const moves=allMoves(player).filter(m=>m.gain>0);
  if(!moves.length) return null;
  if(player==='bot'){
    const topN=Math.min(botTopN(level),moves.length);
    return moves[(Math.random()*topN)|0];
  }
  return moves[0];
}

/* ---------- таймер ---------- */
function startTimer(){
  clearTimer();
  timeLeft=TURN_SEC;
  updateTimer();
  timerId=setInterval(()=>{
    timeLeft--;
    updateTimer();
    if(timeLeft<=0){clearTimer();pass();}
  },1000);
}
function clearTimer(){
  if(timerId){clearInterval(timerId);timerId=null;}
  if(botTimerId){clearInterval(botTimerId);botTimerId=null;}
  if(botThinkId){clearTimeout(botThinkId);botThinkId=null;}
  botVisualLeft=0;
}
function updateTimer(){
  const pct=(timeLeft/TURN_SEC)*100;
  const fill=$('timerFill');
  const bar=$('timerbar');
  if(fill){fill.style.width=pct+'%';fill.style.background='var(--you-hi)';}
  const urgent=timeLeft<=10;
  if(bar){bar.className='timerbar'+(urgent?' urgent':'');}
  const tp=$('turnPill');
  if(tp&&turn==='you'){
    tp.textContent=`Ваш ход · ${timeLeft}с`;
    tp.className='turnpill you'+(urgent?' urgent':'');
  }
}

function startBotTimer(mv){
  // Визуальный таймер: те же 50с, что у игрока, розовый цвет
  botVisualLeft=TURN_SEC;
  updateBotTimer();
  botTimerId=setInterval(()=>{
    botVisualLeft--;
    updateBotTimer();
    if(botVisualLeft<=0){clearInterval(botTimerId);botTimerId=null;}
  },1000);
  // Фоновый таймер: случайно 10–40с, по нему бот делает ход
  const thinkMs=(10+Math.floor(Math.random()*31))*1000;
  botThinkId=setTimeout(()=>{
    botThinkId=null;
    clearInterval(botTimerId);botTimerId=null;
    if(mv){
      const before=board.filter(t=>t.owner==='bot').length;
      applyWord('bot',mv.tiles,mv.word);
      const gain=board.filter(t=>t.owner==='bot').length-before;
      renderWordLog('bot',mv.word,Math.max(gain,0));passes=0;
    } else {passes++;}
    busy=false;
    if(checkEnd()){render();return;}
    turn='you';setMsg('');render();startTimer();
  },thinkMs);
}
function updateBotTimer(){
  const fill=$('timerFill');
  const bar=$('timerbar');
  const tp=$('turnPill');
  const pct=(botVisualLeft/TURN_SEC)*100;
  if(fill){fill.style.width=pct+'%';fill.style.background='var(--bot-hi)';}
  if(bar){bar.className='timerbar';}
  if(tp){tp.textContent=`Соперник думает · ${botVisualLeft}с`;tp.className='turnpill';}
}

/* ---------- отрисовка ---------- */
function render(){
  const b=$('board');b.style.gridTemplateColumns=`repeat(${COLS},var(--tile))`;
  const locks=lockedSet(board);b.innerHTML='';
  board.forEach((t,i)=>{
    const el=document.createElement('button');
    el.className='tile'+(t.owner?(' '+t.owner):'')+(locks.has(i)?' lock':'');
    const k=sel.indexOf(i);
    if(k>-1){el.classList.add('sel');const o=document.createElement('span');o.className='ord';o.textContent=k+1;el.appendChild(o);}
    el.appendChild(document.createTextNode(t.ch.toUpperCase()));
    el.onclick=()=>tapTile(i);
    b.appendChild(el);
  });
  const you=board.filter(t=>t.owner==='you').length;
  const bot=board.filter(t=>t.owner==='bot').length;
  $('youScore').textContent=you;$('botScore').textContent=bot;
  const word=sel.map(i=>board[i].ch).join('');
  $('cur').innerHTML=word?word.toUpperCase().split('').join(''):'<span class="ph">— —</span>';
  $('acceptBtn').disabled=!(word.length>=2&&turn==='you'&&!busy);
  const tp=$('turnPill');
  if(turn==='you'){tp.textContent=`Ваш ход · ${timeLeft}с`;tp.className='turnpill you'+(timeLeft<=10?' urgent':'');}
  else{tp.textContent=botVisualLeft>0?`Соперник думает · ${botVisualLeft}с`:'Соперник ищет слово…';tp.className='turnpill';}
  $('levelLine').textContent=`Уровень ${level}`;
  $('botName').textContent=botTitle(level);
  $('botAva').textContent=botAvaChar(level);
}

function setMsg(t,cls=''){const m=$('msg');m.textContent=t;m.className='msg '+cls;}

function renderWordLog(player,word,gain){
  const box=$(player==='you'?'youWords':'botWords');
  const row=document.createElement('div');row.className='wrow';
  row.innerHTML=`<span>${word.toUpperCase()}</span><b>+${gain}</b>`;
  box.prepend(row);while(box.children.length>3)box.removeChild(box.lastChild);
}

/* ---------- ввод ---------- */
function tapTile(i){
  if(turn!=='you'||busy) return;
  const k=sel.indexOf(i);
  if(k>-1){sel=sel.slice(0,k);}else sel.push(i);
  setMsg('');render();
}
function clearSel(){sel=[];setMsg('');render();}

function youAccept(){
  if(turn!=='you'||busy) return;
  const word=sel.map(i=>board[i].ch).join('');
  if(word.length<2) return;
  if(!DICT.has(word)){setMsg('Нет в словаре','bad');shake();return;}
  if(!wordAllowed(word)){setMsg('Слово уже было','bad');shake();return;}
  const before=board.filter(t=>t.owner==='you').length;
  applyWord('you',sel.slice(),word);
  const gain=board.filter(t=>t.owner==='you').length-before;
  renderWordLog('you',word,Math.max(gain,0));
  clearTimer();passes=0;sel=[];
  setMsg('Слово принято','good');
  endTurnTo('bot');
}

function pass(){
  if(turn!=='you'||busy) return;
  sel=[];passes++;setMsg('Ход пропущен');
  if(checkEnd()) return;
  endTurnTo('bot');
}

function shake(){const c=$('cur');c.animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:160});}

/* ---------- ход бота ---------- */
function endTurnTo(who){
  turn=who;render();
  if(who==='bot'){
    clearTimer();
    busy=true;
    // вычисляем ход сразу, но показываем с задержкой
    setTimeout(()=>{
      const mv=bestMove('bot');
      startBotTimer(mv);
    },100);
  }
}

function checkEnd(){
  const full=board.every(t=>t.owner!==null);
  // Fallback: оба игрока застряли — нет ходов с захватом ни у кого
  const stuck=passes>=4
    &&allMoves('you').filter(m=>m.gain>0).length===0
    &&allMoves('bot').filter(m=>m.gain>0).length===0;
  if(full||stuck){
    clearTimer();
    const you=board.filter(t=>t.owner==='you').length;
    const bot=board.filter(t=>t.owner==='bot').length;
    const won=you>bot;
    const e=$('end');e.classList.add('show');
    if(won){
      if(level>=50){
        $('endTitle').textContent='Вы прошли игру! 🏆';
        $('endText').textContent=`${you} : ${bot} — все 50 уровней пройдены`;
        $('endNew').textContent='Начать заново';
        level=1; localStorage.setItem('duel_level',1);
      } else {
        level++;
        localStorage.setItem('duel_level',level);
        $('endTitle').textContent='Уровень пройден! 🎉';
        $('endText').textContent=`${you} : ${bot} — вы переходите на уровень ${level}`;
        $('endNew').textContent=`Уровень ${level} →`;
      }
    } else if(you===bot){
      $('endTitle').textContent='Ничья';
      $('endText').textContent=`${you} : ${bot} — попробуйте ещё раз`;
      $('endNew').textContent='Попробовать снова';
    } else {
      $('endTitle').textContent='Поражение';
      $('endText').textContent=`${you} : ${bot} — уровень ${level} ещё не покорился`;
      $('endNew').textContent='Попробовать снова';
    }
    render();
    return true;
  }
  return false;
}

/* ---------- подсказка ---------- */
function hint(){
  if(turn!=='you'||busy) return;
  const mv=bestMove('you');
  if(!mv){setMsg('Нет ходов — пропустите','bad');return;}
  sel=mv.tiles.slice();render();
  document.querySelectorAll('.tile.sel').forEach(el=>el.classList.add('hint'));
  setMsg('Подсказка: '+mv.word.toUpperCase(),'good');
}

/* ---------- старт ---------- */
function startGame(){
  board=newBoard();sel=[];turn='you';played=new Set();passes=0;busy=false;
  const bonus=botBonusTiles(level);
  if(bonus>0){
    const idxs=[...Array(N).keys()].sort(()=>Math.random()-.5);
    let given=0;
    for(const i of idxs){if(given>=bonus)break;board[i].owner='bot';given++;}
  }
  $('youWords').innerHTML='';$('botWords').innerHTML='';$('end').classList.remove('show');
  setMsg('');render();startTimer();
}

$('acceptBtn').onclick=youAccept;
$('clearBtn').onclick=clearSel;
$('hintBtn').onclick=hint;
$('passBtn').onclick=pass;
$('resetBtn').onclick=()=>{
  if(!confirm('Сбросить прогресс до уровня 1?')) return;
  level=1;localStorage.setItem('duel_level',1);startGame();
};
$('endNew').onclick=startGame;


/* ---------- вкладки ---------- */
const TIERS=[
  {from:1,to:3,title:'Новичок',ava:'🤖'},
  {from:4,to:6,title:'Любитель',ava:'😐'},
  {from:7,to:9,title:'Знаток',ava:'🧠'},
  {from:10,to:14,title:'Мастер',ava:'😎'},
  {from:15,to:20,title:'Гроссмейстер',ava:'👑'},
  {from:21,to:50,title:'Легенда',ava:'🔥'},
];

function switchTab(name){
  const isGame=name==='game';
  $('gameTab').classList.toggle('hidden',!isGame);
  $('levelsTab').classList.toggle('hidden',isGame);
  $('tabGame').classList.toggle('active',isGame);
  $('tabLevels').classList.toggle('active',!isGame);
  if(!isGame) renderLevels();
}

function renderLevels(){
  const grid=$('levelsGrid');
  grid.innerHTML='';
  $('lvlCount').textContent=`${level-1} / 50`;
  const maxShow=50;
  for(const tier of TIERS){
    if(tier.from>maxShow) break;
    const section=document.createElement('div');
    section.className='lvl-tier';
    const hdr=document.createElement('div');
    hdr.className='lvl-tier-hdr';
    hdr.textContent=tier.ava+' '+tier.title;
    section.appendChild(hdr);
    const tgrid=document.createElement('div');
    tgrid.className='lvl-grid';
    const end=Math.min(tier.to===Infinity?maxShow:tier.to, maxShow);
    for(let i=tier.from;i<=end;i++){
      const done=i<level, current=i===level, locked=i>level;
      const cell=document.createElement('button');
      cell.className='lvl-cell '+(done?'done':current?'current':'locked');
      cell.disabled=locked;
      cell.innerHTML=`<span class="lvl-n">${i}</span><span class="lvl-e">${done?'✓':locked?'🔒':tier.ava}</span>`;
      if(!locked) cell.onclick=(()=>{const lvl=i;return()=>{
        level=lvl;localStorage.setItem('duel_level',lvl);
        switchTab('game');startGame();
      };})();
      tgrid.appendChild(cell);
    }
    section.appendChild(tgrid);
    grid.appendChild(section);
  }
  // Scroll to current level
  setTimeout(()=>{
    const cur=grid.querySelector('.current');
    if(cur) cur.scrollIntoView({behavior:'smooth',block:'center'});
  },50);
}

async function loadDict(){
  setMsg('Загрузка словаря…');
  busy=true;
  try{
    const r=await fetch('./words_ru.txt');
    const text=await r.text();
    DICT=new Set(text.split('\n').map(w=>w.trim().replace(/ё/g,'е').toLowerCase()).filter(Boolean));
  }catch(e){
    setMsg('Ошибка загрузки словаря','bad');
  }
  startGame();
}
loadDict();
</script>
