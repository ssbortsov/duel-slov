<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дуэль слов</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg-0:#19162b; --bg-1:#241f3d; --bg-2:#2c2247;
    --ink:#f2eefb; --ink-dim:#9a93b8;
    --slate:#46537a; --slate-hi:#56649a;
    --you:#3d6fd1; --you-hi:#5b8def; --you-lock:#9fc0ff;
    --bot:#c95a92; --bot-hi:#ff5f9e; --bot-lock:#ffb3d6;
    --accent:#ff4f8b;
    --good:#4ad6a0; --bad:#ff6b6b;
    --r:14px; --tile:58px; --gap:7px;
    --font: -apple-system, "Segoe UI", Roboto, system-ui, "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    font-family:var(--font); color:var(--ink);
    background:
      radial-gradient(120% 80% at 18% 0%, rgba(61,111,209,.20), transparent 55%),
      radial-gradient(120% 80% at 82% 0%, rgba(201,90,146,.22), transparent 55%),
      linear-gradient(180deg,var(--bg-1),var(--bg-0));
    background-attachment:fixed;
    display:flex; justify-content:center;
    padding:14px 12px 22px; min-height:100%;
  }
  .app{width:100%; max-width:440px; display:flex; flex-direction:column; gap:12px}

  .topline{text-align:center; letter-spacing:.14em; font-size:10px; color:var(--ink-dim);
    text-transform:uppercase; font-weight:700}

  /* players */
  .players{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px}
  .pl{display:flex; flex-direction:column; align-items:center; gap:3px; min-width:0}
  .ava{width:52px; height:52px; border-radius:50%; display:grid; place-items:center;
    font-size:26px; background:#0e0c1c; border:3px solid var(--slate-hi); position:relative}
  .pl.you .ava{border-color:var(--you-hi); box-shadow:0 0 0 4px rgba(91,141,239,.14)}
  .pl.bot .ava{border-color:var(--bot-hi); box-shadow:0 0 0 4px rgba(255,95,158,.14)}
  .pname{font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase}
  .pl.you .pname{color:var(--you-hi)} .pl.bot .pname{color:var(--bot-hi)}
  .pscore{font-size:30px; font-weight:800; line-height:1}
  .pl.you .pscore{color:var(--you-hi)} .pl.bot .pscore{color:var(--bot-hi)}
  .turnpill{font-size:11px; font-weight:800; text-align:center; padding:9px 12px; border-radius:999px;
    border:1.5px solid var(--accent); color:var(--ink); background:rgba(255,79,139,.08);
    min-width:120px; line-height:1.25}
  .turnpill.you{border-color:var(--you-hi); background:rgba(91,141,239,.10)}
  .words{margin-top:2px; width:100%; display:flex; flex-direction:column; gap:3px}
  .wrow{display:flex; justify-content:space-between; font-size:11px; font-weight:700;
    background:rgba(255,255,255,.04); padding:3px 8px; border-radius:7px}
  .pl.you .wrow{color:#c9d8ff} .pl.bot .wrow{color:#ffcbe2}
  .wrow b{font-weight:800}

  /* board */
  .board{display:grid; gap:var(--gap); justify-content:center; margin:2px auto 0}
  .tile{width:var(--tile); height:var(--tile); border-radius:var(--r); border:none;
    font-family:var(--font); font-size:26px; font-weight:800; color:#fff;
    display:grid; place-items:center; cursor:pointer; position:relative;
    background:var(--slate); box-shadow:0 3px 0 rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.12);
    transition:transform .08s, background .15s; user-select:none}
  .tile:active{transform:translateY(1px)}
  .tile.you{background:var(--you)} .tile.bot{background:var(--bot)}
  .tile.you.lock{background:var(--you-lock); color:#10254e}
  .tile.bot.lock{background:var(--bot-lock); color:#5e1238}
  .tile.lock::after{content:""; position:absolute; top:5px; right:6px; width:6px; height:6px;
    border-radius:50%; background:rgba(255,255,255,.55)}
  .tile.sel{outline:3px solid var(--accent); outline-offset:-1px; transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(255,79,139,.35)}
  .tile .ord{position:absolute; left:-4px; top:-5px; min-width:16px; height:16px; padding:0 3px;
    border-radius:8px; background:var(--accent); color:#fff; font-size:10px; font-weight:800;
    display:grid; place-items:center}
  .tile.hint{animation:pulse .55s ease 2}
  @keyframes pulse{50%{outline:3px solid var(--good); outline-offset:-1px}}

  /* current word + controls */
  .cur{height:30px; display:flex; align-items:center; justify-content:center; gap:1px;
    font-size:20px; font-weight:800; letter-spacing:.12em}
  .cur .ph{color:var(--ink-dim); letter-spacing:.3em; font-weight:700}
  .msg{height:16px; text-align:center; font-size:12px; font-weight:700}
  .msg.bad{color:var(--bad)} .msg.good{color:var(--good)}
  .controls{display:grid; grid-template-columns:1fr 1fr 1.4fr; gap:8px}
  .btn{border:none; border-radius:999px; padding:13px 10px; font-family:var(--font);
    font-size:14px; font-weight:800; cursor:pointer; color:var(--ink);
    background:rgba(255,255,255,.07)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:rgba(255,255,255,.06); color:var(--ink-dim)}
  .btn.accept{background:var(--you); color:#fff; box-shadow:0 3px 0 #2b54a8}
  .btn:disabled{opacity:.4; cursor:default; box-shadow:none}
  .subbar{display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:2px}
  .linkbtn{background:none; border:none; color:var(--ink-dim); font-size:12px; font-weight:700;
    cursor:pointer; text-decoration:underline; font-family:var(--font)}

  /* end overlay */
  .end{position:fixed; inset:0; background:rgba(12,10,24,.82); display:none;
    place-items:center; padding:24px; z-index:9}
  .end.show{display:grid}
  .card{width:100%; max-width:340px; background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
    border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:26px 22px; text-align:center}
  .card h2{margin:0 0 6px; font-size:24px; font-weight:800}
  .card p{margin:0 0 18px; color:var(--ink-dim); font-size:14px; font-weight:700}
</style>
</head>
<body>
<div class="app">
  <div class="topline">Закрасьте больше клеток, чем соперник</div>

  <div class="players">
    <div class="pl you">
      <div class="ava">🐰</div>
      <div class="pname">Игрок</div>
      <div class="pscore" id="youScore">0</div>
      <div class="words" id="youWords"></div>
    </div>
    <div class="turnpill" id="turnPill">Ваш ход</div>
    <div class="pl bot">
      <div class="ava">😈</div>
      <div class="pname">Соперник</div>
      <div class="pscore" id="botScore">0</div>
      <div class="words" id="botWords"></div>
    </div>
  </div>

  <div class="board" id="board"></div>

  <div class="cur" id="cur"><span class="ph">— —</span></div>
  <div class="msg" id="msg"></div>

  <div class="controls">
    <button class="btn ghost" id="hintBtn">Подсказка</button>
    <button class="btn ghost" id="clearBtn">Сброс</button>
    <button class="btn accept" id="acceptBtn" disabled>Принять</button>
  </div>
  <div class="subbar">
    <button class="linkbtn" id="passBtn">Пропустить ход</button>
    <button class="linkbtn" id="newBtn">Новая партия</button>
  </div>
</div>

<div class="end" id="end">
  <div class="card">
    <h2 id="endTitle"></h2>
    <p id="endText"></p>
    <button class="btn accept" id="endNew" style="width:100%">Новая партия</button>
  </div>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg){ try{ tg.ready(); tg.expand(); }catch(e){} }

/* ---------- словарь-заглушка (заменяется на 67K pymorphy3-список) ---------- */
const RAW = `
вода воды дом дома дым дыра рука руки нога ноги рот рота рост рос роса рос сорок сорока сор сок сока сало сила сило соло осока окно окна около лак лама рама рана рано рань рано лес леса лето лета липа лиса лисы коса косы кот кота кит кита нота ноты ноль ноль соль соло поле поля пол пола полк полка стол стола стон стона сон сны сено село сера сорт сорта спор спора пора порт порта парк парка пар пара пир пира пирс прах прок порок порог торг торс торт трос рост насос нос носа нрав парус прокат пророк скала скат скот скос след слон слот спрос старт стая стая стан стена стен стек степ серп сетка сито скол сноп спам спас спор тара трон трос трап трек трюк урок утро ухо ухи укол усы факт фара фарс фант фон фото хор хора храп хлам хлеб холм холод хром цена цена час часы чат чех шар шарф шов шок штрих эра этап юла яд яма`
  .replace(/ё/g,'е').toLowerCase().split(/\s+/).filter(Boolean);

// расширим простыми частыми словами
const EXTRA = ("акт ара акр атас барс бас бал бант бар бок бор бот бра брат вал вар вес вет вид вис вол вор вот гол гон гора горн грот дар дача дело день дети дог дол дочь друг ель ера еда жар жор зал зар зло знак зов икра иго ил иск кадр кант кара карп карт каска квас кедр кит клад клан клен клик клон код кол кон корд корм корт край крап крах крем крен крест крот круг куб лад лама лань лапа лапка ласка лед лен лес лето лик литр лоб лов лом лор лот лук маг мак мар март мат мах мел мера метр мех мина мир мор мост мот мох мудак муж нал нар нерв низ нос ода озеро окоп опал опор опт орда орел орех оса осада осел отел пакт пал палка пан пар парк паста пат пах пел пена пик пир план плат плед плот плут под подкоп пол поле полк помол пора порка порог пост пот пресс прок прокол протест проток пруд прут пук путь рад раб раба раз рай рак рана рант рейка ремонт репа риск род рок рол рост рот рта руда рукав сап сват свет сев сед сель серп сеть сила сито скал скат скот скрап слух смак смог смрад снег сноп сок сом сон сорт спа спад спам сплав спор спорт срам срок старт стек степ сток стол стон сук суп сыр там танк тара тлен ток том тон топ топор торг торс торт трал трап трек трос трус труп узор укол укор укос урна усик утка факт флаг флот фон фронт фунт фут хам хан хват хор храм хруст цех чад чан чек чех шанс шар шарф штат щит эра яд як`)
  .replace(/ё/g,'е').toLowerCase().split(/\s+/).filter(Boolean);

const DICT = new Set([...RAW, ...EXTRA].filter(w=>w.length>=2));

/* ---------- конфиг поля ---------- */
const COLS=5, ROWS=4, N=COLS*ROWS;
const BAG = (()=>{ // частотно-взвешенный мешок
  const w={о:11,е:10,а:8,и:7,н:7,т:6,с:6,р:6,в:5,л:5,к:5,п:4,м:4,д:4,у:4,я:2,г:2,з:2,б:2,й:2,х:2,ж:1,ш:1,ц:1,ч:2,ь:2,ы:2,э:1,ф:1,ю:1};
  const arr=[]; for(const k in w){ for(let i=0;i<w[k];i++) arr.push(k);} return arr;
})();
const VOW = new Set(['а','е','и','о','у','ы','э','ю','я']);

/* ---------- состояние ---------- */
let board=[], sel=[], turn='you', played=new Set(), passes=0, busy=false;
const $=id=>document.getElementById(id);
const idx=(r,c)=>r*COLS+c;
const neighbors=i=>{const r=(i/COLS)|0,c=i%COLS,o=[];if(r>0)o.push(i-COLS);if(r<ROWS-1)o.push(i+COLS);if(c>0)o.push(i-1);if(c<COLS-1)o.push(i+1);return o;};

function letterMultiset(arr){const m={};for(const ch of arr)m[ch]=(m[ch]||0)+1;return m;}
function formable(word, counts){const need={};for(const ch of word){need[ch]=(need[ch]||0)+1;if((need[ch])>(counts[ch]||0))return false;}return true;}

function newBoard(){
  for(let tries=0; tries<60; tries++){
    const b=[];
    for(let i=0;i<N;i++) b.push({ch:BAG[(Math.random()*BAG.length)|0], owner:null});
    const vowels=b.filter(t=>VOW.has(t.ch)).length;
    if(vowels<6||vowels>11) continue;
    const counts=letterMultiset(b.map(t=>t.ch));
    let ok=0; for(const w of DICT){ if(formable(w,counts)){ok++; if(ok>=14)break;} }
    if(ok>=14) return b;
  }
  return Array.from({length:N},()=>({ch:BAG[(Math.random()*BAG.length)|0],owner:null}));
}

/* блокировка: клетка защищена, если все её соседи того же владельца */
function lockedSet(b){
  const s=new Set();
  for(let i=0;i<N;i++){ const o=b[i].owner; if(!o) continue;
    if(neighbors(i).every(j=>b[j].owner===o)) s.add(i); }
  return s;
}

/* правило Letterpress: слово не игралось и не начинается с уже сыгранного */
function wordAllowed(w){
  if(played.has(w)) return false;
  for(const p of played){ if(w.length>p.length && w.startsWith(p)) return false; }
  return true;
}

/* применить слово игрока player, используя конкретные клетки tiles[] */
function applyWord(player, tiles, word){
  const locks=lockedSet(board);
  for(const i of tiles){
    if(board[i].owner===player) continue;
    if(board[i].owner && locks.has(i)) continue; // защищённую чужую не отнять
    board[i].owner=player;
  }
  played.add(word);
}

/* ---------- бот ---------- */
function bestMove(player){
  const counts=letterMultiset(board.map(t=>t.ch));
  const locks=lockedSet(board);
  let best=null;
  for(const w of DICT){
    if(!wordAllowed(w)||!formable(w,counts)) continue;
    // подобрать клетки под слово, максимизируя выгоду
    const used=new Set(); let tiles=[], gain=0, steal=0, okWord=true;
    const need=letterMultiset(w);
    for(const ch in need){
      // кандидаты этой буквы, отсортированы по выгоде флипа
      const cand=[];
      for(let i=0;i<N;i++){ if(board[i].ch===ch&&!used.has(i)) cand.push(i); }
      cand.sort((a,b)=>flipVal(b,player,locks)-flipVal(a,player,locks));
      if(cand.length<need[ch]){ okWord=false; break; }
      for(let k=0;k<need[ch];k++){ const i=cand[k]; used.add(i); tiles.push(i);
        const o=board[i].owner;
        if(o!==player && !(o&&locks.has(i))){ gain++; if(o&&o!==player) steal++; } }
    }
    if(!okWord) continue;
    const score=gain*10 + steal*4 + w.length; // выгода, отъём, длина
    if(!best||score>best.score) best={word:w,tiles,score,gain};
  }
  return (best && best.gain>0) ? best : null;
}
function flipVal(i,player,locks){
  const o=board[i].owner;
  if(o===player) return 0;
  if(o && locks.has(i)) return 0;     // не отнять
  if(o) return 3;                      // отнять чужую
  return 2;                            // закрасить пустую
}

/* ---------- отрисовка ---------- */
function render(){
  const b=$('board'); b.style.gridTemplateColumns=`repeat(${COLS}, var(--tile))`;
  const locks=lockedSet(board); b.innerHTML='';
  board.forEach((t,i)=>{
    const el=document.createElement('button');
    el.className='tile'+(t.owner?(' '+t.owner):'')+(locks.has(i)?' lock':'');
    const k=sel.indexOf(i);
    if(k>-1){ el.classList.add('sel'); const o=document.createElement('span'); o.className='ord'; o.textContent=k+1; el.appendChild(o); }
    el.appendChild(document.createTextNode(t.ch.toUpperCase()));
    el.onclick=()=>tapTile(i);
    b.appendChild(el);
  });
  const you=board.filter(t=>t.owner==='you').length;
  const bot=board.filter(t=>t.owner==='bot').length;
  $('youScore').textContent=you; $('botScore').textContent=bot;
  const word=sel.map(i=>board[i].ch).join('');
  $('cur').innerHTML = word ? word.toUpperCase().split('').join('') : '<span class="ph">— —</span>';
  $('acceptBtn').disabled = !(word.length>=2 && turn==='you' && !busy);
  const tp=$('turnPill');
  if(turn==='you'){ tp.textContent='Ваш ход'; tp.className='turnpill you'; }
  else { tp.textContent='Соперник ищет слово…'; tp.className='turnpill'; }
}
function setMsg(t,cls=''){ const m=$('msg'); m.textContent=t; m.className='msg '+cls; }

function renderWordLog(player, word, gain){
  const box=$(player==='you'?'youWords':'botWords');
  const row=document.createElement('div'); row.className='wrow';
  row.innerHTML=`<span>${word.toUpperCase()}</span><b>+${gain}</b>`;
  box.prepend(row); while(box.children.length>3) box.removeChild(box.lastChild);
}

/* ---------- ввод ---------- */
function tapTile(i){
  if(turn!=='you'||busy) return;
  const k=sel.indexOf(i);
  if(k>-1){ sel=sel.slice(0,k); }      // тап по выбранной — откат до неё
  else sel.push(i);
  setMsg(''); render();
}
function clearSel(){ sel=[]; setMsg(''); render(); }

function youAccept(){
  if(turn!=='you'||busy) return;
  const word=sel.map(i=>board[i].ch).join('');
  if(word.length<2){ return; }
  if(!DICT.has(word)){ setMsg('Нет в словаре прототипа','bad'); shake(); return; }
  if(!wordAllowed(word)){ setMsg('Слово уже было','bad'); shake(); return; }
  const before=board.filter(t=>t.owner==='you').length;
  applyWord('you', sel.slice(), word);
  const gain=board.filter(t=>t.owner==='you').length-before;
  renderWordLog('you',word,Math.max(gain,0));
  passes=0; sel=[];
  setMsg('Слово принято','good');
  endTurnTo('bot');
}

function pass(){
  if(turn!=='you'||busy) return;
  sel=[]; passes++; setMsg('Ход пропущен');
  if(checkEnd()) return;
  endTurnTo('bot');
}

function shake(){ const c=$('cur'); c.animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:160}); }

/* ---------- ход бота ---------- */
function endTurnTo(who){
  turn=who; render();
  if(who==='bot'){
    busy=true;
    setTimeout(()=>{
      const mv=bestMove('bot');
      if(mv){
        const before=board.filter(t=>t.owner==='bot').length;
        applyWord('bot', mv.tiles, mv.word);
        const gain=board.filter(t=>t.owner==='bot').length-before;
        renderWordLog('bot',mv.word,Math.max(gain,0)); passes=0;
      } else { passes++; }
      busy=false;
      if(checkEnd()){ render(); return; }
      turn='you'; setMsg(''); render();
    }, 650);
  }
}

function checkEnd(){
  const full = board.every(t=>t.owner!==null);
  if(full || passes>=2){
    const you=board.filter(t=>t.owner==='you').length;
    const bot=board.filter(t=>t.owner==='bot').length;
    const e=$('end'); e.classList.add('show');
    $('endTitle').textContent = you>bot?'Победа':(you<bot?'Поражение':'Ничья');
    $('endText').textContent = `Игрок ${you} : ${bot} Соперник`;
    return true;
  }
  return false;
}

/* ---------- подсказка ---------- */
function hint(){
  if(turn!=='you'||busy) return;
  const mv=bestMove('you');
  if(!mv){ setMsg('Нет ходов — пропустите','bad'); return; }
  sel=mv.tiles.slice(); render();
  document.querySelectorAll('.tile.sel').forEach(el=>el.classList.add('hint'));
  setMsg('Подсказка: '+mv.word.toUpperCase(),'good');
}

/* ---------- старт ---------- */
function startGame(){
  board=newBoard(); sel=[]; turn='you'; played=new Set(); passes=0; busy=false;
  $('youWords').innerHTML=''; $('botWords').innerHTML=''; $('end').classList.remove('show');
  setMsg(''); render();
}

$('acceptBtn').onclick=youAccept;
$('clearBtn').onclick=clearSel;
$('hintBtn').onclick=hint;
$('passBtn').onclick=pass;
$('newBtn').onclick=startGame;
$('endNew').onclick=startGame;
startGame();
</script>
</body>
</html>
